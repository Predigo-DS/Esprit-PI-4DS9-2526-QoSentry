services:

  # ─────────────────────────────────────────
  # VECTOR STORE
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qos-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - qos-network
    entrypoint: >
      sh -c "apt-get update -qq && apt-get install -y -qq curl &&
      exec /qdrant/qdrant"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # RAG SERVICE  (ingestion + retrieval)
  # ─────────────────────────────────────────
  rag:
    build:
      context: ./ai-services/rag
      dockerfile: Dockerfile
    container_name: qos-rag
    ports:
      - "8001:8001"
    env_file:
      - ./ai-services/rag/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    volumes:
      - ./ai-services/rag/app:/app
      - ./data:/data:ro
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────
  # AGENT SERVICE  (LangGraph orchestration)
  # ─────────────────────────────────────────
  agent:
    build:
      context: ./ai-services/agent
      dockerfile: Dockerfile
    container_name: qos-agent
    ports:
      - "8002:8002"
    env_file:
      - ./ai-services/agent/.env
    environment:
      - RAG_SERVICE_URL=http://rag:8001
      - LLM_MODEL=${LLM_MODEL:-llama3-8b-8192}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./ai-services/agent/app:/app
    depends_on:
      rag:
        condition: service_healthy
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

# ─────────────────────────────────────────
# SHARED NETWORK & VOLUMES
# ─────────────────────────────────────────
networks:
  qos-network:
    driver: bridge

volumes:
  qdrant_data:
