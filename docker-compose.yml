services:

  # ─────────────────────────────────────────
  # POSTGRES (LangGraph checkpoints)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: qos-postgres
    environment:
      - POSTGRES_DB=qosbuddy
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qosbuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # VECTOR STORE
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qos-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - qos-network
    entrypoint: >
      sh -c "apt-get update -qq && apt-get install -y -qq curl &&
      exec /qdrant/qdrant"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period : 90s

  # ─────────────────────────────────────────
  # RAG SERVICE  (ingestion + retrieval)
  # ─────────────────────────────────────────
  rag:
    build:
      context: ./ai-services/rag
      dockerfile: Dockerfile
    container_name: qos-rag
    ports:
      - "8001:8001"
    env_file:
      - ./ai-services/rag/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-en-v1.5}
    volumes:
      - ./ai-services/rag/app:/app
      - ./data:/data:ro
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period : 30s

  # ─────────────────────────────────────────
  # AGENT SERVICE  (LangGraph orchestration)
  # ─────────────────────────────────────────
  agent:
    build:
      context: ./ai-services/agent
      dockerfile: Dockerfile
    container_name: qos-agent
    ports:
      - "8002:8002"
    env_file:
      - ./ai-services/agent/.env
    environment:
      - RAG_SERVICE_URL=http://rag:8001
      - CHECKPOINT_DB_URI=postgresql://postgres:postgres@postgres:5432/qosbuddy
    volumes:
      - ./ai-services/agent/app:/app
      - ./config:/app/config:ro
    depends_on:
      - postgres
      - rag
    networks:
      - qos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

# ─────────────────────────────────────────
# SHARED NETWORK & VOLUMES
# ─────────────────────────────────────────
networks:
  qos-network:
    driver: bridge

volumes:
  qdrant_data:
  postgres_data:
